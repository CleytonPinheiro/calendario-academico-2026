<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Planejamento 2026 - Tânia Varella</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FAF9F6;
            color: #333333;
            margin: 0;
            padding: 0;
        }

        /* Grid Principal: Fins de semana com 35% da largura dos dias úteis */
        .calendar-grid {
            display: grid;
            grid-template-columns: 0.35fr 1fr 1fr 1fr 1fr 1fr 0.35fr;
            border: 2px solid #000;
            flex-grow: 1;
        }
        
        .day-cell {
            min-height: 120px; 
            display: flex;
            flex-direction: column;
            padding: 4px;
            border: 1px solid #000;
            background-color: white;
            position: relative;
        }

        .academic-row {
            border-bottom: 1px solid #000;
            height: 16px;
            width: 100%;
        }

        .label-text {
            font-size: 7px;
            font-weight: 900;
            color: #000;
            text-transform: uppercase;
            margin-right: 3px;
        }

        .check-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            margin-top: 4px;
        }

        .check-item {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .check-box {
            border: 1.5px solid #000;
            width: 10px;
            height: 10px;
            display: inline-block;
        }

        .points-label {
            font-size: 5.5px;
            font-weight: 800;
            color: #444;
        }

        .lesson-dots {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            margin-left: 4px;
        }

        .lesson-circle {
            border: 1.5px solid #000;
            border-radius: 50%;
            width: 13px;
            height: 13px;
            font-size: 0.65rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
        }

        .day-blocked {
            background-color: #f1f1f1 !important;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.05) 10px, rgba(0,0,0,0.05) 20px);
        }

        .header-grid {
            display: grid;
            grid-template-columns: 0.35fr 1fr 1fr 1fr 1fr 1fr 0.35fr;
            text-align: center;
            font-weight: 900;
            font-size: 11px;
            border-x: 2px solid #000;
            border-top: 2px solid #000;
            background-color: #f3f4f6;
        }

        @media print {
            @page { 
                size: A4 landscape; 
                margin: 5mm; 
            }
            
            nav, .no-print { display: none !important; }
            
            body, html { 
                height: 100%;
                background-color: white; 
            }

            main { 
                padding: 0 !important; 
                margin: 0 !important; 
                width: 100% !important;
                height: 100% !important;
                display: flex;
                flex-direction: column;
            }

            .calendar-container { 
                border: none !important; 
                box-shadow: none !important; 
                border-radius: 0 !important;
                height: 100% !important;
                display: flex;
                flex-direction: column;
            }

            #calendar-grid {
                flex-grow: 1;
                grid-auto-rows: 1fr; 
            }

            .day-cell { 
                height: auto !important;
                min-height: 0 !important;
                border: 1px solid #000 !important; 
                -webkit-print-color-adjust: exact;
                page-break-inside: avoid;
            }

            .header-grid { background-color: #eee !important; -webkit-print-color-adjust: exact; }
            .day-blocked { background-color: #eee !important; -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50 no-print shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-4">
                    <img src="https://raw.githubusercontent.com/CleytonPinheiro/calendario-academico-2026/main/Logo%20sem%20Fundo.png" 
                         alt="Logo" class="h-10 w-auto">
                    <div class="flex flex-col">
                        <span class="text-md font-black text-gray-900 leading-tight uppercase">Planejamento 2026</span>
                        <span class="text-[10px] font-semibold text-indigo-600 tracking-widest uppercase">Campos de Avaliação 60/40</span>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="window.print()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg text-sm font-bold shadow-md flex items-center gap-2 transition-all">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                        IMPRIMIR PAISAGEM
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow py-4 w-full px-4 print:px-0 print:py-0">
        <div class="calendar-container bg-white shadow-xl border border-gray-200 print:border-0 print:shadow-none">
            
            <!-- Cabeçalho de Impressão -->
            <div class="hidden print:flex justify-between items-center px-2 py-1 border-b-2 border-black">
                <div class="flex items-center gap-3">
                    <img src="https://raw.githubusercontent.com/CleytonPinheiro/calendario-academico-2026/main/Logo%20sem%20Fundo.png" class="h-10 w-auto">
                    <div class="font-black text-lg uppercase leading-none">C.E. Tânia Varella</div>
                </div>
                <h2 class="font-black text-2xl uppercase" id="print-month-label">Fevereiro 2026</h2>
                <div class="text-right">
                    <div class="text-[10px] font-black uppercase">Registro de Classe 2026</div>
                    <div class="text-[7px] font-bold text-gray-500 uppercase">Aulas 1 a 6 | Avaliações 60/40</div>
                </div>
            </div>

            <!-- Controles do Mês (No-print) -->
            <div class="flex items-center justify-between bg-gray-50 border-b border-gray-200 no-print px-6 py-3">
                <button onclick="changeMonth(-1)" class="p-2 hover:bg-indigo-100 rounded-full transition text-indigo-600 font-bold">&larr; Anterior</button>
                <h2 id="current-month-label" class="text-2xl font-black text-gray-800 capitalize">Fevereiro 2026</h2>
                <button onclick="changeMonth(1)" class="p-2 hover:bg-indigo-100 rounded-full transition text-indigo-600 font-bold">Próximo &rarr;</button>
            </div>

            <!-- Dias da Semana -->
            <div class="header-grid font-bold">
                <div class="py-1 border-r border-black">DOM</div>
                <div class="py-1 border-r border-black">SEG</div>
                <div class="py-1 border-r border-black">TER</div>
                <div class="py-1 border-r border-black">QUA</div>
                <div class="py-1 border-r border-black">QUI</div>
                <div class="py-1 border-r border-black">SEX</div>
                <div class="py-1 border-black">SÁB</div>
            </div>

            <!-- Grid de Dias -->
            <div id="calendar-grid" class="calendar-grid"></div>
        </div>
    </main>

    <script>
        const months = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        const schoolEvents = [
            { date: '2026-01-01', name: 'Ano Novo', type: 'holiday' },
            { date: '2026-02-02', name: 'Planejamento', type: 'planning' },
            { date: '2026-02-03', name: 'Planejamento', type: 'planning' },
            { date: '2026-02-04', name: 'Início 1º Trim', type: 'term' },
            { date: '2026-02-05', name: 'Início Aulas', type: 'term' },
            { date: '2026-02-16', name: 'Recesso', type: 'recess' },
            { date: '2026-02-17', name: 'Carnaval', type: 'holiday' },
            { date: '2026-02-18', name: 'Cinzas', type: 'recess' },
            { date: '2026-04-03', name: 'Paixão', type: 'holiday' },
            { date: '2026-04-21', name: 'Tiradentes', type: 'holiday' },
            { date: '2026-05-01', name: 'Trabalho', type: 'holiday' },
            { date: '2026-06-04', name: 'Corpus Christi', type: 'holiday' },
            { date: '2026-09-07', name: 'Independência', type: 'holiday' },
            { date: '2026-10-12', name: 'Padroeira', type: 'holiday' },
            { date: '2026-10-13', name: 'Dia Professor', type: 'holiday' },
            { date: '2026-11-02', name: 'Finados', type: 'holiday' },
            { date: '2026-11-15', name: 'Proclamação', type: 'holiday' },
            { date: '2026-11-20', name: 'Consciência Negra', type: 'holiday' },
            { date: '2026-12-18', name: 'Término Aulas', type: 'term' }
        ];

        let blockedDays = new Set();
        let currentState = { year: 2026, month: 1 };

        schoolEvents.forEach(e => {
            if (['holiday', 'recess', 'planning'].includes(e.type)) blockedDays.add(e.date);
        });

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            
            const label = `${months[currentState.month]} ${currentState.year}`;
            document.getElementById('current-month-label').textContent = label;
            document.getElementById('print-month-label').textContent = label;

            const firstDay = new Date(currentState.year, currentState.month, 1).getDay();
            const daysInMonth = new Date(currentState.year, currentState.month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="day-cell bg-gray-50 border border-black opacity-30"></div>`;
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${currentState.year}-${String(currentState.month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayOfWeek = new Date(currentState.year, currentState.month, day).getDay();
                const event = schoolEvents.find(e => e.date === dateStr);
                const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
                const isBlocked = blockedDays.has(dateStr);

                let cellHtml = `
                    <div class="day-cell ${isWeekend ? 'bg-gray-100' : ''} ${isBlocked ? 'day-blocked' : ''}">
                        <div class="flex justify-between items-start">
                            <span class="font-black text-sm">${day}</span>
                            ${event ? `<span class="text-[5.5px] font-black text-indigo-700 uppercase leading-none text-right">${event.name}</span>` : ''}
                        </div>
                `;

                if (!isBlocked && !isWeekend) {
                    // DOIS COMPROMISSOS POR DIA
                    for (let cardNum = 1; cardNum <= 2; cardNum++) {
                        cellHtml += `
                            <div class="mt-2 border-t border-dotted border-gray-400 pt-1 first:border-0 first:mt-1">
                                <div class="flex justify-between items-start">
                                    <div class="flex-grow">
                                        <div class="flex items-end">
                                            <span class="label-text">PROF:</span>
                                            <div class="academic-row flex-grow"></div>
                                        </div>
                                        <div class="flex items-end mt-1">
                                            <span class="label-text">DISC:</span>
                                            <div class="academic-row flex-grow"></div>
                                        </div>
                                    </div>
                                    <div class="lesson-dots">
                                        <div class="lesson-circle">1</div><div class="lesson-circle">2</div><div class="lesson-circle">3</div>
                                        <div class="lesson-circle">4</div><div class="lesson-circle">5</div><div class="lesson-circle">6</div>
                                    </div>
                                </div>
                                <div class="check-group">
                                    <div class="check-item">
                                        <span class="check-box"></span>
                                        <span class="points-label">AV (60 pts)</span>
                                    </div>
                                    <div class="check-item">
                                        <span class="check-box"></span>
                                        <span class="points-label">REC (60 pts)</span>
                                    </div>
                                    <div class="check-item">
                                        <span class="check-box"></span>
                                        <span class="points-label">AV (40 pts)</span>
                                    </div>
                                    <div class="check-item">
                                        <span class="check-box"></span>
                                        <span class="points-label">REC (40 pts)</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                } else if (isWeekend) {
                   cellHtml += `<div class="mt-auto text-center text-[7px] font-black text-gray-400 uppercase">${dayOfWeek === 0 ? 'DOMINGO' : 'SÁBADO'}</div>`;
                }

                cellHtml += `</div>`;
                grid.innerHTML += cellHtml;
            }
        }

        function changeMonth(delta) {
            currentState.month = (currentState.month + delta + 12) % 12;
            renderCalendar();
        }

        window.onload = renderCalendar;
    </script>
</body>
</html>
