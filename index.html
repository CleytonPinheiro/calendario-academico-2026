<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Planejamento 2026 - SEED PR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FAF9F6;
            color: #333333;
        }

        /* Ajuste na largura das colunas: Finais de semana com metade da largura (0.5fr) */
        .calendar-grid {
            display: grid;
            grid-template-columns: 0.5fr 1fr 1fr 1fr 1fr 1fr 0.5fr;
            border: 2px solid #000;
        }
        
        .day-cell {
            min-height: 190px;
            display: flex;
            flex-direction: column;
            padding: 0.35rem;
            border: 1px solid #000;
            background-color: white;
            position: relative;
            transition: background-color 0.2s;
        }

        .day-cell:hover:not(.is-weekend) {
            background-color: #f9fafb;
            cursor: pointer;
        }

        .academic-row {
            border-bottom: 1px solid #000;
            height: 14px;
            margin-top: 3px;
        }

        .check-group {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            font-size: 0.55rem;
            margin-top: 4px;
            line-height: 1;
        }

        .check-box {
            border: 1px solid #000;
            width: 8px;
            height: 8px;
            display: inline-block;
            margin-right: 2px;
        }

        .lesson-dots {
            display: flex;
            gap: 3px;
            margin-top: 3px;
        }

        .lesson-circle {
            border: 1px solid #000;
            border-radius: 50%;
            width: 12px;
            height: 12px;
            font-size: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Status de Bloqueio Pedagógico */
        .day-blocked {
            background-color: #f1f1f1 !important;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 15px, rgba(0,0,0,0.02) 15px, rgba(0,0,0,0.02) 30px);
        }

        .lock-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.15;
            pointer-events: none;
        }

        /* Ajuste do cabeçalho de dias para bater com o grid */
        .header-grid {
            display: grid;
            grid-template-columns: 0.5fr 1fr 1fr 1fr 1fr 1fr 0.5fr;
            text-align: center;
            font-bold;
            font-size: 10px;
            border-x: 1px solid #000;
            border-top: 1px solid #000;
            background-color: #f3f4f6;
        }

        @media print {
            @page { 
                size: A4 portrait; 
                margin: 0.5cm; 
            }
            nav, .no-print, .intro-text { display: none !important; }
            main { padding: 0 !important; margin: 0 !important; max-width: 100% !important; }
            .day-cell { height: 188px !important; border: 1.5px solid #000 !important; overflow: hidden; }
            .day-blocked .content-to-hide { display: none !important; }
            .day-blocked { background-color: #eee !important; -webkit-print-color-adjust: exact; }
            .header-grid { background-color: #fff !important; }
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- Navegação / Controles -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50 no-print shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-2">
                    <div class="bg-indigo-600 p-1.5 rounded-lg text-white">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    </div>
                    <span class="text-xl font-bold text-gray-800">SEED-PR 2026 <span class="text-indigo-600">Digital</span></span>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-right hidden sm:block">
                        <p class="text-[10px] text-gray-500 font-medium leading-none uppercase tracking-widest">Painel Pedagógico</p>
                        <p class="text-[11px] text-gray-400">Clique no dia para validar</p>
                    </div>
                    <button onclick="window.print()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg text-sm font-bold shadow-sm transition-all transform hover:scale-105 active:scale-95 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                        IMPRIMIR A4
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-[99%] mx-auto py-4 w-full px-2">

        <div class="calendar-container bg-white shadow-xl rounded-xl overflow-hidden border border-gray-200 print:border-0 print:shadow-none">
            
            <!-- Cabeçalho do Mês -->
            <div class="flex items-center justify-between bg-gray-50 border-b border-gray-200 no-print px-6 py-4">
                <button onclick="changeMonth(-1)" class="p-2 hover:bg-indigo-100 rounded-full transition text-indigo-600 font-bold text-xl">&larr;</button>
                <div class="text-center">
                    <h2 id="current-month-label" class="text-2xl font-black text-gray-800 capitalize tracking-tight">Fevereiro 2026</h2>
                </div>
                <button onclick="changeMonth(1)" class="p-2 hover:bg-indigo-100 rounded-full transition text-indigo-600 font-bold text-xl">&rarr;</button>
            </div>
            
            <h2 class="hidden print:block text-center font-black text-3xl mb-4 text-black uppercase" id="print-month-label">Fevereiro 2026</h2>

            <!-- Dias da Semana com Largura Adaptada -->
            <div class="header-grid font-bold text-[10px] print:bg-white">
                <div class="py-2 border-r border-black">DOM</div>
                <div class="py-2 border-r border-black">SEG</div>
                <div class="py-2 border-r border-black">TER</div>
                <div class="py-2 border-r border-black">QUA</div>
                <div class="py-2 border-r border-black">QUI</div>
                <div class="py-2 border-r border-black">SEX</div>
                <div class="py-2 border-black">SÁB</div>
            </div>

            <div id="calendar-grid" class="calendar-grid">
                <!-- Conteúdo gerado via JS -->
            </div>
        </div>

        <div class="mt-4 no-print text-center">
            <p class="text-sm text-gray-500 font-medium">© 2026 Planejamento Escolar - Layout Otimizado (Fins de Semana em 50% de largura)</p>
        </div>
    </main>

    <script>
        const months = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        
        const schoolEvents = [
            { date: '2026-01-01', name: 'Ano Novo', type: 'holiday' },
            { date: '2026-02-02', name: 'Estudo e Planejamento', type: 'planning' },
            { date: '2026-02-03', name: 'Estudo e Planejamento', type: 'planning' },
            { date: '2026-02-04', name: 'Início do 1º Trim.', type: 'term' },
            { date: '2026-02-05', name: 'Início das Aulas', type: 'term' },
            { date: '2026-02-16', name: 'Recesso Escolar', type: 'recess' },
            { date: '2026-02-17', name: 'Feriado: Carnaval', type: 'holiday' },
            { date: '2026-02-18', name: 'Recesso: Cinzas', type: 'recess' },
            { date: '2026-04-03', name: 'Paixão de Cristo', type: 'holiday' },
            { date: '2026-04-05', name: 'Páscoa', type: 'holiday' },
            { date: '2026-04-20', name: 'Recesso', type: 'recess' },
            { date: '2026-04-21', name: 'Feriado: Tiradentes', type: 'holiday' },
            { date: '2026-05-01', name: 'Dia do Trabalho', type: 'holiday' },
            { date: '2026-05-14', name: 'Término 1º Trim.', type: 'term' },
            { date: '2026-05-15', name: 'Estudo e Planejamento', type: 'planning' },
            { date: '2026-05-18', name: 'Início 2º Trim.', type: 'term' },
            { date: '2026-06-04', name: 'Feriado: Corpus Christi', type: 'holiday' },
            { date: '2026-06-05', name: 'Recesso', type: 'recess' },
            { date: '2026-07-13', name: 'Recesso Julho', type: 'recess' },
            { date: '2026-07-24', name: 'Fim Recesso Julho', type: 'recess' },
            { date: '2026-07-27', name: 'Estudo e Planejamento', type: 'planning' },
            { date: '2026-09-04', name: 'Término 2º Trim.', type: 'term' },
            { date: '2026-09-07', name: 'Independência', type: 'holiday' },
            { date: '2026-09-08', name: 'Início 3º Trim.', type: 'term' },
            { date: '2026-10-12', name: 'N. Sra Aparecida', type: 'holiday' },
            { date: '2026-10-13', name: 'Dia do Professor (Ant.)', type: 'holiday' },
            { date: '2026-11-02', name: 'Feriado: Finados', type: 'holiday' },
            { date: '2026-11-15', name: 'Proc. República', type: 'holiday' },
            { date: '2026-11-20', name: 'Consciência Negra', type: 'holiday' },
            { date: '2026-12-18', name: 'Término das Aulas', type: 'term' },
            { date: '2026-12-21', name: 'Fechamento Escolar', type: 'closing' },
            { date: '2026-12-25', name: 'Natal', type: 'holiday' }
        ];

        let blockedDays = new Set();
        let currentState = { year: 2026, month: 1 };

        schoolEvents.forEach(e => {
            if (['holiday', 'recess', 'planning', 'closing'].includes(e.type)) {
                blockedDays.add(e.date);
            }
        });

        function toggleBlock(dateStr) {
            if (blockedDays.has(dateStr)) {
                blockedDays.delete(dateStr);
            } else {
                blockedDays.add(dateStr);
            }
            renderCalendar();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            
            const label = `${months[currentState.month]} ${currentState.year}`;
            document.getElementById('current-month-label').textContent = label;
            document.getElementById('print-month-label').textContent = label;

            const firstDay = new Date(currentState.year, currentState.month, 1).getDay();
            const daysInMonth = new Date(currentState.year, currentState.month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="day-cell bg-gray-50 border border-black"></div>`;
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dayPadded = String(day).padStart(2, '0');
                const monthPadded = String(currentState.month + 1).padStart(2, '0');
                const dateStr = `${currentState.year}-${monthPadded}-${dayPadded}`;
                
                const dateObj = new Date(currentState.year, currentState.month, day);
                const dayOfWeek = dateObj.getDay();
                
                const event = schoolEvents.find(e => e.date === dateStr);
                const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
                const isBlocked = blockedDays.has(dateStr);

                let cellHtml = `
                    <div class="day-cell ${isWeekend ? 'is-weekend bg-gray-100' : ''} ${isBlocked ? 'day-blocked' : ''}" 
                         onclick="toggleBlock('${dateStr}')">
                        
                        <div class="flex justify-between items-start mb-1">
                            <span class="font-bold text-sm ${isWeekend ? 'text-gray-400' : ''}">${day}</span>
                            ${event ? `<span class="text-[6px] font-black text-indigo-700 uppercase text-right leading-none max-w-[90%]">${event.name}</span>` : ''}
                        </div>
                `;

                if (isBlocked) {
                    cellHtml += `
                        <div class="lock-indicator">
                            <svg class="w-8 h-8 text-gray-500" fill="currentColor" viewBox="0 0 20 20"><path d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" /></svg>
                        </div>
                    `;
                } else if (!isWeekend) {
                    for (let cardNum = 1; cardNum <= 2; cardNum++) {
                        cellHtml += `
                            <div class="content-to-hide mt-1 border-t border-dotted border-gray-200 pt-1 first:border-0 first:mt-0">
                                <div class="flex justify-between items-center">
                                    <span class="text-[6px] font-bold text-gray-400">P/D ${cardNum}</span>
                                    <div class="lesson-dots">
                                        <div class="lesson-circle">1</div><div class="lesson-circle">2</div>
                                        <div class="lesson-circle">3</div><div class="lesson-circle">4</div>
                                        <div class="lesson-circle">5</div><div class="lesson-circle">6</div>
                                    </div>
                                </div>
                                <div class="academic-row"></div>
                                <div class="check-group">
                                    <div><span class="check-box"></span><span class="text-[5px]">AV40</span></div>
                                    <div><span class="check-box"></span><span class="text-[5px]">AV60</span></div>
                                    <div><span class="check-box"></span><span class="text-[5px]">R40</span></div>
                                    <div><span class="check-box"></span><span class="text-[5px]">R60</span></div>
                                </div>
                            </div>
                        `;
                    }
                } else {
                   // Conteúdo minimalista para final de semana para não poluir
                   cellHtml += `<div class="mt-auto text-center text-[7px] font-bold text-gray-300 uppercase">${dayOfWeek === 0 ? 'DOM' : 'SÁB'}</div>`;
                }

                cellHtml += `</div>`;
                grid.innerHTML += cellHtml;
            }
        }

        function changeMonth(delta) {
            currentState.month = (currentState.month + delta + 12) % 12;
            renderCalendar();
        }

        window.onload = renderCalendar;
    </script>
</body>
</html>
