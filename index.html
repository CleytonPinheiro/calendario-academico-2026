<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Planejamento 2026 - Tânia Varella</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FAF9F6;
            color: #333333;
        }

        /* Grid Principal: Fins de semana com 30% da largura dos dias úteis */
        .calendar-grid {
            display: grid;
            grid-template-columns: 0.3fr 1fr 1fr 1fr 1fr 1fr 0.3fr;
            border: 2px solid #000;
        }
        
        .day-cell {
            min-height: 140px; 
            display: flex;
            flex-direction: column;
            padding: 0.25rem;
            border: 1px solid #000;
            background-color: white;
            position: relative;
            transition: background-color 0.2s;
        }

        .day-cell:hover:not(.is-weekend):not(.day-blocked) {
            background-color: #f0f4ff;
            cursor: pointer;
        }

        .academic-row {
            border-bottom: 1px solid #000;
            height: 18px;
            margin-top: 1px;
            width: 100%;
        }

        .label-text {
            font-size: 7px;
            font-weight: 800;
            color: #222;
            text-transform: uppercase;
            margin-right: 2px;
        }

        .check-group {
            display: flex;
            gap: 8px;
            font-size: 0.6rem;
            margin-top: 4px;
        }

        .check-box {
            border: 1px solid #000;
            width: 10px;
            height: 10px;
            display: inline-block;
            margin-right: 2px;
        }

        .lesson-dots {
            display: flex;
            gap: 2px;
            flex-wrap: wrap;
            justify-content: flex-end;
            max-width: 60px;
        }

        .lesson-circle {
            border: 1px solid #000;
            border-radius: 50%;
            width: 12px;
            height: 12px;
            font-size: 0.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .day-blocked {
            background-color: #f1f1f1 !important;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.03) 10px, rgba(0,0,0,0.03) 20px);
        }

        .header-grid {
            display: grid;
            grid-template-columns: 0.3fr 1fr 1fr 1fr 1fr 1fr 0.3fr;
            text-align: center;
            font-weight: bold;
            font-size: 11px;
            border-x: 1px solid #000;
            border-top: 1px solid #000;
            background-color: #f3f4f6;
        }

        @media print {
            @page { 
                size: A4 landscape; 
                margin: 0.4cm; 
            }
            nav, .no-print { display: none !important; }
            body { background-color: white; }
            main { padding: 0 !important; margin: 0 !important; max-width: 100% !important; }
            .calendar-container { border: none !important; box-shadow: none !important; border-radius: 0 !important; }
            .day-cell { 
                height: 135px !important; 
                min-height: 135px !important;
                border: 1px solid #000 !important; 
                -webkit-print-color-adjust: exact;
            }
            .header-grid { background-color: #eee !important; -webkit-print-color-adjust: exact; }
            .day-blocked { background-color: #eee !important; -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- Navegação Interativa -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50 no-print shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-4">
                    <div class="flex items-center space-x-3">
                        <img id="main-logo" 
                             src="https://raw.githubusercontent.com/CleytonPinheiro/calendario-academico-2026/main/Logo%20sem%20Fundo.png" 
                             alt="Logo" 
                             class="h-10 w-auto"
                             onerror="this.src='https://ui-avatars.com/api/?name=TV&background=4f46e5&color=fff&size=128';">
                        <div class="flex flex-col">
                            <span class="text-md font-black text-gray-900 leading-tight uppercase">Planejamento 2026</span>
                            <span class="text-[10px] font-semibold text-indigo-600 tracking-widest uppercase">Modo Paisagem / A4</span>
                        </div>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="window.print()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg text-sm font-bold shadow-md flex items-center gap-2 transition-all active:scale-95">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                        IMPRIMIR (PAISAGEM)
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow py-4 w-full px-4 print:px-0">
        <div class="calendar-container bg-white shadow-xl rounded-xl overflow-hidden border border-gray-200 print:border-0 print:shadow-none">
            
            <!-- Controles do Mês -->
            <div class="flex items-center justify-between bg-gray-50 border-b border-gray-200 no-print px-6 py-3">
                <button onclick="changeMonth(-1)" class="p-2 hover:bg-indigo-100 rounded-full transition text-indigo-600 font-bold">&larr; Mês Anterior</button>
                <h2 id="current-month-label" class="text-2xl font-black text-gray-800 capitalize tracking-tight">Fevereiro 2026</h2>
                <button onclick="changeMonth(1)" class="p-2 hover:bg-indigo-100 rounded-full transition text-indigo-600 font-bold">Próximo Mês &rarr;</button>
            </div>
            
            <!-- Cabeçalho de Impressão -->
            <div class="hidden print:flex justify-between items-center mb-2 px-2 pt-1 border-b-2 border-black pb-2">
                <div class="flex items-center gap-4">
                    <img src="https://raw.githubusercontent.com/CleytonPinheiro/calendario-academico-2026/main/Logo%20sem%20Fundo.png" class="h-14 w-auto">
                    <div>
                        <div class="font-black text-xl uppercase leading-none">C.E. Tânia Varella</div>
                        <div class="text-[8px] font-bold text-gray-600 uppercase">Secretaria de Estado da Educação - SEED/PR</div>
                    </div>
                </div>
                <h2 class="font-black text-3xl uppercase tracking-tighter" id="print-month-label">Fevereiro 2026</h2>
                <div class="text-right">
                    <div class="text-[10px] font-black uppercase">Registro de Classe 2026</div>
                    <div class="text-[8px] font-bold text-gray-500 italic">Documento de Planejamento Diário</div>
                </div>
            </div>

            <!-- Dias da Semana -->
            <div class="header-grid font-bold print:bg-white">
                <div class="py-2 border-r border-black">DOMINGO</div>
                <div class="py-2 border-r border-black">SEGUNDA-FEIRA</div>
                <div class="py-2 border-r border-black">TERÇA-FEIRA</div>
                <div class="py-2 border-r border-black">QUARTA-FEIRA</div>
                <div class="py-2 border-r border-black">QUINTA-FEIRA</div>
                <div class="py-2 border-r border-black">SEXTA-FEIRA</div>
                <div class="py-2 border-black">SÁBADO</div>
            </div>

            <!-- Grid de Dias -->
            <div id="calendar-grid" class="calendar-grid"></div>
        </div>
    </main>

    <script>
        const months = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        
        // Datas principais do calendário acadêmico SEED-PR 2026
        const schoolEvents = [
            { date: '2026-01-01', name: 'Ano Novo', type: 'holiday' },
            { date: '2026-02-02', name: 'Estudo e Planejamento', type: 'planning' },
            { date: '2026-02-03', name: 'Estudo e Planejamento', type: 'planning' },
            { date: '2026-02-04', name: 'Início 1º Trimestre', type: 'term' },
            { date: '2026-02-05', name: 'Início das Aulas', type: 'term' },
            { date: '2026-02-16', name: 'Recesso', type: 'recess' },
            { date: '2026-02-17', name: 'Carnaval', type: 'holiday' },
            { date: '2026-02-18', name: 'Cinzas', type: 'recess' },
            { date: '2026-04-03', name: 'Paixão de Cristo', type: 'holiday' },
            { date: '2026-04-21', name: 'Tiradentes', type: 'holiday' },
            { date: '2026-05-01', name: 'Dia do Trabalho', type: 'holiday' },
            { date: '2026-06-04', name: 'Corpus Christi', type: 'holiday' },
            { date: '2026-09-07', name: 'Independência', type: 'holiday' },
            { date: '2026-10-12', name: 'N. Sra. Aparecida', type: 'holiday' },
            { date: '2026-10-13', name: 'Dia do Professor', type: 'holiday' },
            { date: '2026-11-02', name: 'Finados', type: 'holiday' },
            { date: '2026-11-15', name: 'Proclamação', type: 'holiday' },
            { date: '2026-11-20', name: 'Consciência Negra', type: 'holiday' },
            { date: '2026-12-18', name: 'Término Aulas', type: 'term' }
        ];

        let blockedDays = new Set();
        let currentState = { year: 2026, month: 1 }; // Começa em Fevereiro

        // Pré-bloquear feriados e planejamentos
        schoolEvents.forEach(e => {
            if (['holiday', 'recess', 'planning'].includes(e.type)) blockedDays.add(e.date);
        });

        function toggleBlock(dateStr) {
            blockedDays.has(dateStr) ? blockedDays.delete(dateStr) : blockedDays.add(dateStr);
            renderCalendar();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            
            const label = `${months[currentState.month]} ${currentState.year}`;
            document.getElementById('current-month-label').textContent = label;
            document.getElementById('print-month-label').textContent = label;

            const firstDay = new Date(currentState.year, currentState.month, 1).getDay();
            const daysInMonth = new Date(currentState.year, currentState.month + 1, 0).getDate();

            // Células vazias iniciais
            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="day-cell bg-gray-50 border border-black"></div>`;
            }

            // Gerar dias do mês
            for (let day = 1; day <= daysInMonth; day++) {
                const dayPadded = String(day).padStart(2, '0');
                const monthPadded = String(currentState.month + 1).padStart(2, '0');
                const dateStr = `${currentState.year}-${monthPadded}-${dayPadded}`;
                const dayOfWeek = new Date(currentState.year, currentState.month, day).getDay();
                
                const event = schoolEvents.find(e => e.date === dateStr);
                const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
                const isBlocked = blockedDays.has(dateStr);

                let cellHtml = `
                    <div class="day-cell ${isWeekend ? 'bg-gray-100' : ''} ${isBlocked ? 'day-blocked' : ''}" 
                         onclick="toggleBlock('${dateStr}')">
                        <div class="flex justify-between items-start mb-1">
                            <span class="font-bold text-sm">${day}</span>
                            ${event ? `<span class="text-[6px] font-black text-indigo-700 uppercase leading-none text-right">${event.name}</span>` : ''}
                        </div>
                `;

                if (!isBlocked && !isWeekend) {
                    // APENAS DOIS BLOCOS DE PLANEJAMENTO POR DIA
                    for (let cardNum = 1; cardNum <= 2; cardNum++) {
                        cellHtml += `
                            <div class="mt-2 border-t border-dotted border-gray-400 pt-1 first:border-0 first:mt-0">
                                <div class="flex justify-between items-start">
                                    <div class="flex-grow">
                                        <div class="flex items-end">
                                            <span class="label-text">PROF:</span>
                                            <div class="academic-row flex-grow"></div>
                                        </div>
                                        <div class="flex items-end mt-1">
                                            <span class="label-text">DISC:</span>
                                            <div class="academic-row flex-grow"></div>
                                        </div>
                                    </div>
                                    <div class="lesson-dots ml-2">
                                        <div class="lesson-circle">1</div><div class="lesson-circle">2</div>
                                        <div class="lesson-circle">3</div><div class="lesson-circle">4</div>
                                    </div>
                                </div>
                                <div class="check-group">
                                    <div class="flex items-center"><span class="check-box"></span><span class="text-[6px] font-bold">AVALIAÇÃO</span></div>
                                    <div class="flex items-center"><span class="check-box"></span><span class="text-[6px] font-bold">RECUPER.</span></div>
                                </div>
                            </div>
                        `;
                    }
                } else if (isWeekend) {
                   cellHtml += `<div class="mt-auto text-center text-[7px] font-black text-gray-400 uppercase tracking-widest">${dayOfWeek === 0 ? 'DOMINGO' : 'SÁBADO'}</div>`;
                } else if (isBlocked) {
                    cellHtml += `
                        <div class="flex-grow flex items-center justify-center opacity-10">
                            <svg class="w-12 h-12" fill="currentColor" viewBox="0 0 20 20"><path d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" /></svg>
                        </div>
                    `;
                }

                cellHtml += `</div>`;
                grid.innerHTML += cellHtml;
            }
        }

        function changeMonth(delta) {
            currentState.month = (currentState.month + delta + 12) % 12;
            renderCalendar();
        }

        window.onload = renderCalendar;
    </script>
</body>
</html>
