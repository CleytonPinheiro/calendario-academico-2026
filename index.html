<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Planejamento 2026 - Tânia Varella</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        :root {
            --print-black: #000000;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: 0.35fr 1fr 1fr 1fr 1fr 1fr 0.35fr;
            border: 1.5px solid var(--print-black);
            border-top: none; /* Evita borda dupla com o cabeçalho */
        }
        
        .day-cell {
            min-height: 160px;
            display: flex;
            flex-direction: column;
            padding: 0.25rem;
            border: 0.5px solid var(--print-black);
            background-color: white;
            position: relative;
        }

        .academic-line {
            border-bottom: 1px solid #000;
            height: 14px;
            margin-top: 1px;
            width: 100%;
            outline: none;
            font-size: 8.5px;
            font-weight: 600;
            padding-left: 2px;
            white-space: nowrap;
            overflow: hidden;
        }

        .label-text {
            font-size: 5.5px;
            font-weight: 900;
            color: #000;
            text-transform: uppercase;
            margin-right: 2px;
            white-space: nowrap;
            letter-spacing: -0.2px;
        }

        .check-group {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            margin-top: 3px;
            row-gap: 2px;
        }

        .check-item {
            display: flex;
            align-items: center;
            gap: 1.5px;
            cursor: pointer;
            user-select: none;
        }

        .check-box-ui {
            border: 1px solid #000;
            width: 9px;
            height: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
        }

        .check-box-ui.active {
            background: #000;
        }

        .check-box-ui.active::after {
            content: '✓';
            color: white;
            font-size: 7px;
            font-weight: bold;
        }

        .lesson-dots {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            margin-left: 2px;
        }

        .lesson-circle {
            border: 1px solid #000;
            border-radius: 50%;
            width: 11px;
            height: 11px;
            font-size: 6.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            cursor: pointer;
            background: white;
        }

        .lesson-circle.active {
            background: #000;
            color: white;
        }

        .day-blocked {
            background-color: #f1f5f9 !important;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 15px, rgba(0,0,0,0.03) 15px, rgba(0,0,0,0.03) 30px);
        }

        .lock-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.1;
            width: 25px;
            height: 25px;
            pointer-events: none;
        }

        .header-grid {
            display: grid;
            grid-template-columns: 0.35fr 1fr 1fr 1fr 1fr 1fr 0.35fr;
            text-align: center;
            font-weight: 900;
            font-size: 9px;
            background-color: #f8fafc; /* Fundo cinza bem claro */
            color: #000; /* Texto em preto */
            border: 1.5px solid var(--print-black);
            border-bottom: 2px solid var(--print-black);
        }

        .card-container {
            border-top: 1px dashed #eee;
            padding-top: 2px;
            margin-top: 2px;
        }
        .card-container:first-child {
            border-top: none;
            padding-top: 0;
            margin-top: 0;
        }

        @media print {
            @page { 
                size: A4 portrait; 
                margin: 0.4cm; 
            }
            body { background: white; }
            nav, .no-print { display: none !important; }
            main { padding: 0 !important; margin: 0 !important; max-width: 100% !important; }
            .calendar-container { box-shadow: none !important; border: none !important; }
            .day-cell { 
                min-height: 154px !important; 
                height: 154px !important;
                break-inside: avoid; 
                overflow: hidden;
            }
            .header-grid { background-color: #fff !important; -webkit-print-color-adjust: exact; }
            .lesson-circle.active, .check-box-ui.active { background-color: #000 !important; color: white !important; -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50 no-print shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-14">
                <div class="flex items-center space-x-3">
                    <img src="https://raw.githubusercontent.com/CleytonPinheiro/calendario-academico-2026/main/Logo%20sem%20Fundo.png" 
                         alt="Logo" class="h-8 w-auto"
                         onerror="this.src='https://ui-avatars.com/api/?name=TV&background=000&color=fff';">
                    <span class="text-md font-black text-gray-900 uppercase">Planejamento 2026</span>
                </div>
                
                <div class="flex items-center space-x-2">
                    <div class="flex bg-gray-100 p-0.5 rounded-lg">
                        <button onclick="changeMonth(-1)" class="px-2 hover:bg-white rounded transition text-sm">&larr;</button>
                        <div id="nav-month-label" class="px-3 py-1 font-bold text-[11px] min-w-[100px] text-center">Fevereiro 2026</div>
                        <button onclick="changeMonth(1)" class="px-2 hover:bg-white rounded transition text-sm">&rarr;</button>
                    </div>
                    <button onclick="window.print()" class="bg-black text-white px-3 py-1.5 rounded-lg text-[10px] font-bold">
                        IMPRIMIR A4
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-[1100px] mx-auto py-2 w-full px-4 print:p-0 print:max-w-full">
        
        <div class="hidden print:flex justify-between items-end mb-1 px-1">
            <div class="flex items-center gap-2">
                <img src="https://raw.githubusercontent.com/CleytonPinheiro/calendario-academico-2026/main/Logo%20sem%20Fundo.png" class="h-10 w-auto">
                <div>
                    <h1 class="font-black text-md uppercase leading-none">C.E. Tânia Varella</h1>
                    <p class="text-[6px] font-bold text-gray-400 uppercase">SEED/PR - Gestão Acadêmica 2026</p>
                </div>
            </div>
            <h2 id="print-month-label" class="font-black text-lg uppercase">Fevereiro 2026</h2>
        </div>

        <div class="calendar-container bg-white shadow-lg rounded-lg overflow-hidden border border-gray-200 print:border-0 print:shadow-none">
            
            <!-- Cabeçalho agora com fundo claro e bordas sólidas -->
            <div class="header-grid py-1.5">
                <div class="border-r border-black">DOM</div>
                <div class="border-r border-black">SEG</div>
                <div class="border-r border-black">TER</div>
                <div class="border-r border-black">QUA</div>
                <div class="border-r border-black">QUI</div>
                <div class="border-r border-black">SEX</div>
                <div>SÁB</div>
            </div>

            <div id="calendar-grid" class="calendar-grid"></div>
        </div>
    </main>

    <script>
        const months = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        const schoolEvents = [
            { date: '2026-01-01', name: 'Ano Novo', type: 'holiday' },
            { date: '2026-02-02', name: 'Planejamento', type: 'planning' },
            { date: '2026-02-03', name: 'Planejamento', type: 'planning' },
            { date: '2026-02-04', name: 'Início 1º Trim.', type: 'term' },
            { date: '2026-02-05', name: 'Início Aulas', type: 'term' },
            { date: '2026-02-16', name: 'Recesso', type: 'recess' },
            { date: '2026-02-17', name: 'Carnaval', type: 'holiday' },
            { date: '2026-02-18', name: 'Cinzas', type: 'recess' },
            { date: '2026-04-03', name: 'Sexta Santa', type: 'holiday' },
            { date: '2026-04-21', name: 'Tiradentes', type: 'holiday' },
            { date: '2026-05-01', name: 'Dia Trabalho', type: 'holiday' },
            { date: '2026-06-04', name: 'Corpus Christi', type: 'holiday' },
            { date: '2026-09-07', name: 'Independência', type: 'holiday' },
            { date: '2026-10-12', name: 'Padroeira', type: 'holiday' },
            { date: '2026-10-15', name: 'Professor', type: 'holiday' },
            { date: '2026-11-02', name: 'Finados', type: 'holiday' },
            { date: '2026-11-15', name: 'Proclamação', type: 'holiday' },
            { date: '2026-11-20', name: 'Consciência', type: 'holiday' },
            { date: '2026-12-18', name: 'Término Aulas', type: 'term' }
        ];

        let currentState = { year: 2026, month: 1 };
        let blockedDays = new Set();
        let appState = {};

        schoolEvents.forEach(e => {
            if (['holiday', 'recess', 'planning'].includes(e.type)) blockedDays.add(e.date);
        });

        function toggleBlock(dateStr, event) {
            if (event.target.closest('.interactive-element')) return;
            if (blockedDays.has(dateStr)) blockedDays.delete(dateStr);
            else blockedDays.add(dateStr);
            renderCalendar();
        }

        function toggleMarker(id, type) {
            const key = `${id}-${type}`;
            appState[key] = !appState[key];
            renderCalendar();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            
            const label = `${months[currentState.month]} ${currentState.year}`;
            document.getElementById('nav-month-label').textContent = label;
            document.getElementById('print-month-label').textContent = label;

            const firstDay = new Date(currentState.year, currentState.month, 1).getDay();
            const daysInMonth = new Date(currentState.year, currentState.month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="day-cell bg-gray-50/50"></div>`;
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${currentState.year}-${String(currentState.month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayOfWeek = new Date(currentState.year, currentState.month, day).getDay();
                const event = schoolEvents.find(e => e.date === dateStr);
                const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
                const isBlocked = blockedDays.has(dateStr);

                let cellHtml = `
                    <div class="day-cell ${isWeekend ? 'is-weekend bg-gray-50/80' : ''} ${isBlocked ? 'day-blocked' : ''}" 
                         onclick="toggleBlock('${dateStr}', event)">
                        <div class="flex justify-between items-start mb-0.5">
                            <span class="font-black text-[10px] ${isWeekend ? 'text-gray-400' : 'text-gray-900'}">${day}</span>
                            ${event ? `<span class="text-[5px] font-black text-indigo-700 bg-indigo-50 px-0.5 rounded uppercase leading-none">${event.name}</span>` : ''}
                        </div>
                `;

                if (isBlocked) {
                    cellHtml += `<div class="lock-icon"><svg fill="currentColor" viewBox="0 0 20 20"><path d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" /></svg></div>`;
                } else if (!isWeekend) {
                    for (let b = 1; b <= 2; b++) {
                        const bId = `${dateStr}-b${b}`;
                        cellHtml += `
                            <div class="card-container content-to-hide">
                                <div class="flex justify-between items-start">
                                    <div class="flex-grow space-y-0.5">
                                        <div class="flex items-end"><span class="label-text">PROFESSOR:</span><div class="academic-line flex-grow" contenteditable="true"></div></div>
                                        <div class="flex items-end"><span class="label-text">DISCIPLINA:</span><div class="academic-line flex-grow" contenteditable="true"></div></div>
                                    </div>
                                    <div class="lesson-dots interactive-element">
                                        ${[1,2,3,4,5,6].map(n => `<div class="lesson-circle ${appState[bId+'-l'+n] ? 'active' : ''}" onclick="toggleMarker('${bId}', 'l${n}')">${n}</div>`).join('')}
                                    </div>
                                </div>
                                <div class="check-group interactive-element">
                                    ${['AV40', 'AV60', 'REC', 'REC 40', 'REC 60'].map(l => `
                                        <div class="check-item" onclick="toggleMarker('${bId}', '${l}')">
                                            <div class="check-box-ui ${appState[bId+'-'+l] ? 'active' : ''}"></div>
                                            <span class="text-[5.5px] font-black">${l}</span>
                                        </div>`).join('')}
                                </div>
                            </div>
                        `;
                    }
                } else {
                    cellHtml += `<div class="mt-auto text-center text-[6px] font-black text-gray-300 uppercase">${dayOfWeek === 0 ? 'DOM' : 'SÁB'}</div>`;
                }

                cellHtml += `</div>`;
                grid.innerHTML += cellHtml;
            }
        }

        function changeMonth(delta) {
            currentState.month += delta;
            if (currentState.month > 11) { currentState.month = 0; currentState.year++; }
            else if (currentState.month < 0) { currentState.month = 11; currentState.year--; }
            renderCalendar();
        }

        document.addEventListener('click', e => { if (e.target.getAttribute('contenteditable')) e.stopPropagation(); });
        window.onload = renderCalendar;
    </script>
</body>
</html>
