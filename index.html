<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planejamento Escolar 2026 - SEED PR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FAF9F6;
            color: #333333;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            border: 2px solid #000;
        }
        
        .day-cell {
            min-height: 180px;
            display: flex;
            flex-direction: column;
            padding: 0.3rem;
            border: 1px solid #000;
            background-color: white;
            position: relative;
        }

        .academic-row {
            border-bottom: 1px solid #000;
            height: 14px;
            margin-top: 2px;
        }

        .check-group {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            font-size: 0.55rem;
            margin-top: 2px;
            line-height: 1;
        }

        .check-box {
            border: 1px solid #000;
            width: 8px;
            height: 8px;
            display: inline-block;
            margin-right: 2px;
        }

        .lesson-dots {
            display: flex;
            gap: 3px;
            margin-top: 3px;
        }

        .lesson-circle {
            border: 1px solid #000;
            border-radius: 50%;
            width: 12px;
            height: 12px;
            font-size: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Status de Bloqueio */
        .day-blocked {
            background-color: #f3f4f6 !important;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.03) 10px, rgba(0,0,0,0.03) 20px);
        }

        .lock-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.2;
        }

        @media print {
            @page { size: A4 portrait; margin: 0.5cm; }
            nav, .no-print, .intro-text { display: none !important; }
            main { padding: 0 !important; margin: 0 !important; max-width: 100% !important; }
            .day-cell { height: 185px !important; border: 1.5px solid #000 !important; }
            .day-blocked .content-to-hide { display: none !important; }
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50 no-print">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <span class="text-2xl font-bold text-indigo-600">Calendário SEED-PR 2026</span>
                </div>
                <div class="flex items-center space-x-3">
                    <span class="text-xs text-gray-500 italic">Modo Pedagógico: Clique para Bloquear</span>
                    <button onclick="window.print()" class="bg-black text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-gray-800 transition">
                        Imprimir A4 Retrato
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-[99%] mx-auto py-4 w-full">

        <div id="view-dashboard">
            <div class="calendar-container bg-white shadow-sm print:shadow-none">
                <div class="flex items-center justify-between mb-4 no-print px-4 pt-2">
                    <button onclick="changeMonth(-1)" class="p-2 hover:bg-gray-100 rounded-full font-bold">&larr;</button>
                    <h2 id="current-month-label" class="text-xl font-bold capitalize">Fevereiro 2026</h2>
                    <button onclick="changeMonth(1)" class="p-2 hover:bg-gray-100 rounded-full font-bold">&rarr;</button>
                </div>
                
                <h2 class="hidden print:block text-center font-bold text-2xl mb-2" id="print-month-label">Fevereiro 2026</h2>

                <div class="grid grid-cols-7 text-center font-bold text-[10px] border-x border-t border-black bg-gray-100 print:bg-white">
                    <div class="py-1 border-r border-black">DOMINGO</div>
                    <div class="py-1 border-r border-black">SEGUNDA</div>
                    <div class="py-1 border-r border-black">TERÇA</div>
                    <div class="py-1 border-r border-black">QUARTA</div>
                    <div class="py-1 border-r border-black">QUINTA</div>
                    <div class="py-1 border-r border-black">SEXTA</div>
                    <div class="py-1 border-black">SÁBADO</div>
                </div>

                <div id="calendar-grid" class="calendar-grid">
                    <!-- Gerado dinamicamente -->
                </div>
            </div>
        </div>
    </main>

    <script>
        const months = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        
        // Dados oficiais extraídos do PDF SEED-PR 2026
        const schoolEvents = [
            // Janeiro
            { date: '2026-01-01', name: 'Feriado: Ano Novo', type: 'holiday' },
            // Fevereiro
            { date: '2026-02-02', name: 'Estudo e Planejamento', type: 'planning' },
            { date: '2026-02-03', name: 'Estudo e Planejamento', type: 'planning' },
            { date: '2026-02-04', name: 'Início do 1º Trimestre', type: 'term-start' },
            { date: '2026-02-05', name: 'Início das Aulas', type: 'classes-start' },
            { date: '2026-02-16', name: 'Recesso Escolar', type: 'recess' },
            { date: '2026-02-17', name: 'Feriado: Carnaval', type: 'holiday' },
            { date: '2026-02-18', name: 'Recesso: Cinzas', type: 'recess' },
            // Março
            // Abril
            { date: '2026-04-03', name: 'Feriado: Paixão de Cristo', type: 'holiday' },
            { date: '2026-04-05', name: 'Páscoa', type: 'holiday' },
            { date: '2026-04-20', name: 'Recesso', type: 'recess' },
            { date: '2026-04-21', name: 'Feriado: Tiradentes', type: 'holiday' },
            // Maio
            { date: '2026-05-01', name: 'Feriado: Dia do Trabalho', type: 'holiday' },
            { date: '2026-05-14', name: 'Término do 1º Trimestre', type: 'term-end' },
            { date: '2026-05-15', name: 'Estudo e Planejamento', type: 'planning' },
            { date: '2026-05-18', name: 'Início do 2º Trimestre', type: 'term-start' },
            // Junho
            { date: '2026-06-04', name: 'Feriado: Corpus Christi', type: 'holiday' },
            { date: '2026-06-05', name: 'Recesso', type: 'recess' },
            // Julho
            { date: '2026-07-13', name: 'Início Recesso Julho', type: 'recess' },
            { date: '2026-07-24', name: 'Término Recesso Julho', type: 'recess' },
            { date: '2026-07-27', name: 'Estudo e Planejamento', type: 'planning' },
            // Setembro
            { date: '2026-09-04', name: 'Término do 2º Trimestre', type: 'term-end' },
            { date: '2026-09-07', name: 'Feriado: Independência', type: 'holiday' },
            { date: '2026-09-08', name: 'Início do 3º Trimestre', type: 'term-start' },
            // Outubro
            { date: '2026-10-12', name: 'Feriado: N. Sra. Aparecida', type: 'holiday' },
            { date: '2026-10-13', name: 'Dia do Professor (Ant.)', type: 'holiday' },
            // Novembro
            { date: '2026-11-02', name: 'Feriado: Finados', type: 'holiday' },
            { date: '2026-11-15', name: 'Feriado: Proc. República', type: 'holiday' },
            { date: '2026-11-20', name: 'Feriado: Consciência Negra', type: 'holiday' },
            // Dezembro
            { date: '2026-12-18', name: 'Término das Aulas', type: 'term-end' },
            { date: '2026-12-21', name: 'Fechamento Escolar', type: 'closing' },
            { date: '2026-12-25', name: 'Natal', type: 'holiday' }
        ];

        let blockedDays = new Set();
        let currentState = { year: 2026, month: 1 };

        // Inicializar feriados e recessos como bloqueados
        schoolEvents.forEach(e => {
            if (e.type === 'holiday' || e.type === 'recess' || e.type === 'planning') {
                blockedDays.add(e.date);
            }
        });

        function toggleBlock(dateStr) {
            if (blockedDays.has(dateStr)) {
                blockedDays.delete(dateStr);
            } else {
                blockedDays.add(dateStr);
            }
            renderCalendar();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            
            const label = `${months[currentState.month]} ${currentState.year}`;
            document.getElementById('current-month-label').textContent = label;
            document.getElementById('print-month-label').textContent = label;

            const firstDay = new Date(currentState.year, currentState.month, 1).getDay();
            const daysInMonth = new Date(currentState.year, currentState.month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="day-cell bg-gray-50 border border-black"></div>`;
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${currentState.year}-${String(currentState.month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dateObj = new Date(currentState.year, currentState.month, day);
                const dayOfWeek = dateObj.getDay();
                
                const event = schoolEvents.find(e => e.date === dateStr);
                const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
                const isBlocked = blockedDays.has(dateStr);

                let cellHtml = `
                    <div class="day-cell ${isWeekend ? 'bg-gray-100' : ''} ${isBlocked ? 'day-blocked' : ''}" 
                         onclick="toggleBlock('${dateStr}')" title="Clique para Pedagógico: Bloquear/Liberar">
                        
                        <div class="flex justify-between items-start mb-1">
                            <span class="font-bold text-xs">${day}</span>
                            ${event ? `<span class="text-[6px] font-bold text-red-700 uppercase text-right leading-tight max-w-[80%]">${event.name}</span>` : ''}
                        </div>
                `;

                if (isBlocked) {
                    cellHtml += `
                        <div class="lock-indicator">
                            <svg class="w-8 h-8 text-gray-400" fill="currentColor" viewBox="0 0 20 20"><path d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" /></svg>
                        </div>
                        <div class="mt-auto text-center text-[7px] font-bold text-gray-400 uppercase pb-2">NÃO LETIVO / BLOQUEADO</div>
                    `;
                } else if (!isWeekend) {
                    // Renderiza DOIS CARDS para preenchimento manual
                    for (let cardNum = 1; cardNum <= 2; cardNum++) {
                        cellHtml += `
                            <div class="content-to-hide border-t border-dotted border-gray-300 mt-1 pt-1 first:border-0 first:mt-0">
                                <div class="text-[6px] font-bold text-gray-400 flex justify-between items-center">
                                    <span>PROF/DISC (${cardNum})</span>
                                    <div class="lesson-dots">
                                        <div class="lesson-circle">1</div><div class="lesson-circle">2</div>
                                        <div class="lesson-circle">3</div><div class="lesson-circle">4</div>
                                        <div class="lesson-circle">5</div><div class="lesson-circle">6</div>
                                    </div>
                                </div>
                                <div class="academic-row"></div>
                                <div class="check-group mt-1">
                                    <div><span class="check-box"></span>AV 40</div>
                                    <div><span class="check-box"></span>AV 60</div>
                                    <div><span class="check-box"></span>REC 40</div>
                                    <div><span class="check-box"></span>REC 60</div>
                                </div>
                            </div>
                        `;
                    }
                }

                cellHtml += `</div>`;
                grid.innerHTML += cellHtml;
            }
        }

        function changeMonth(delta) {
            currentState.month = (currentState.month + delta + 12) % 12;
            renderCalendar();
        }

        window.onload = renderCalendar;
    </script>
</body>
</html>
